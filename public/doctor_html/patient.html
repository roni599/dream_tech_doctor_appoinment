                <tr>

                    <td></td>

                    <td></td>

                    <td></td>

                    <td><button class="btn btn-sm btn-primary">+</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Fixed buttons at the bottom -->
    <div class="fixed-bottom-buttons">
        <button class="btn btn-primary me-2">Download PDF</button>
        <button class="btn btn-primary">Print</button>
    </div>

</body>
